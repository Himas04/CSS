body{
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


form{
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 0 10px gray;
    margin: 200px;
}

h2{
    text-align: center;
    margin-bottom: 20px;
}


input[type="text"]{
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 2px solid blue;
    border-radius: 5px;
    box-sizing: border-box;
    box-shadow: 0 0 10px rgb(54, 49, 49);
}


input[type="password"]{
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 2px solid red;
    border-radius: 5px;
    box-sizing: border-box;
    box-shadow: 0 0 10px gray;
}


input[type="submit"]{
    width: 100%;
    padding: 10px;
    background-color: green;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

input[type="submit"]:hover{
    background-color: darkgreen;
}</style>
</head>
<body>

    <form>
        <h2>Login</h2>

        <input type="text" placeholder="Enter Username">

        <input type="password" placeholder="Enter Password">

        <input type="submit" value="Login">
    </form>

</body>
</html>
