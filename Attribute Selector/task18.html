<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .product{
            width: 300px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        img{
            width: 250px;
            border-radius: 10px;
        }

        
        img[src*="product"]{
            border: 4px solid blue;
        }

        
        input[type="button"]{
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

       
        a[href^="https"]{
            color: red;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="product">
        <h2>Wireless Headphones</h2>

        <img src="Gemini_Generated_Image_titgxctitgxctitg.png" alt="cat">

        <p>Price: 990Rs.</p>

        <input type="button" value="Buy Now">

        <br><br>

        <a href="https://www.example.com">View More Products</a>
    </div>

</body>
</html>
