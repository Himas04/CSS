<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    padding:30px;
}

.container{
    width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input,a,img{
    display:block;
    margin:12px auto;
}


input[required]{
    border:2px solid red;
    background:#fff8dc;
}


input[readonly]{
    background:#ddd;
    color:blue;
    font-weight:bold;
}


input[type="email"]{
    border:2px solid green;
}


a[href^="https"]{
    color:green;
    font-weight:bold;
}


a[href$=".pdf"]{
    background:red;
    color:white;
    padding:8px;
    text-decoration:none;
    border-radius:5px;
}


img[src*="photo"]{
    border:5px solid blue;
    border-radius:50%;
}

input{
    width:100%;
    padding:10px;
    border-radius: 3px;
}

input[type="submit"]{
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:darkgreen;
}
</style>

</head>
<body>

<div class="container">

<h2>Student Portal</h2>

<img src="photo.jpg" width="120" height="120" alt="Profile">

<form>

<input type="text" value="PLY2026001" readonly>

<input type="text" placeholder="Student Name" required>

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<input type="submit" value="Register">

</form>

<br>

<a href="CSS_Attribute_Selector_20_Tasks.pdf">Download Student Guide (PDF)</a>

<br><br>

<a href="https://www.google.com">Visit Google</a>

</div>

</body>
</html>
