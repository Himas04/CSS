<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task5</title>
    <style>
      .container {
        position: relative;
        width: 300px;
        height: 200px;
        border: 2px solid black;
        margin: 25%;
      }
      .box1 {
        position: absolute;
        background-color: rgb(243, 138, 0);
        top: 0;
        right: 0;
        padding: 20px;
      }
      .box2 {
        position: absolute;
        background-color: rgb(0, 131, 245);
        padding: 20px;
        left: 0;
        top: 0;
      }
      .box3{
        position: absolute;
        background-color: brown;
        padding: 20px;
        bottom: 0;
       right: 0; 
      }
      .box4{
        position: absolute;
        background-color: turquoise;
        padding: 20px;
        left: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box1">Box1</div>
      <div class="box2">Box2</div>
      <div class="box3">Box3</div>
      <div class="box4">box4</div>
    </div>
  </body>
</html>
