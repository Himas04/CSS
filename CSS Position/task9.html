<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task9</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    background: #f2f2f2;
    }
    .container{
        position: relative;
          width: 400px;
          border-radius: 10px;
          box-shadow: 2px 2px 5px;
          overflow: hidden;
        
        

    }
    .container img{
        border-radius: 10px;
        width: 100%;
        display: block;
    }
    .caption{
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background-color: rgba(0, 0, 0,0.6);
        color: #f2f2f2;
        text-align: center;
        color: white;
    text-align: center;
    padding: 12px;
    border-bottom-left-radius: 10px;
    border-bottom-right-radius: 10px;
    }
</style>
<body>
    <div class="container">
        <img src="https://picsum.photos/400/250" alt="Nature">
        <p class="caption">Caption</p>
    </div>
</body>
</html>
