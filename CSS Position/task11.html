<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task11</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
    font-family:Arial, sans-serif;
}
.card{
    position: relative;
    background: #ffffff;
    border-radius: 10px;
    width: 200px;
    padding: 15px;
    box-shadow: 0 0 10px;
    
}
.ribbon{
    position: absolute;
  background-color: rgba(242, 3, 3, 0.6);
    top: 0;
    right: 0;
padding: 5px;
    width: 100%;
    text-align: center;
    color: #ffffff;
    font-weight: bold;
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
}
h2{
    margin-top: 10px;
    padding: 5px;
    text-align: center;
    font-size: 20px;
    color: slateblue;
}
.price{
    color: tomato;
    text-align: center;
    font-weight: bold;
}
p{
    margin-top: 10px;
    padding-left: 10px;
    color: teal;
    font-size: 15px;
}
button{
    padding: 4px;
    color: rgb(240, 146, 129);
    border-radius: 4px;
    background-color: rgb(63, 55, 55);
    border: none;
    cursor: pointer;
}
    </style>
</head>
<body>
    <div class="card">
    <div class="ribbon">Popular</div>

    <h2>Premium Plan</h2>
    <p class="price">$29/month</p>

    <p>✔ Unlimited Projects</p>
    <p>✔ 24/7 Support</p>
    <p>✔ 100 GB Storage</p>

    <br>

    <button>Choose Plan</button>
</div>
</body>
</html>
