<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini LMS Student Card</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #bcb0b07a;
    font-family: Arial, sans-serif;
}

.student-card{
    position: relative;
    width: 300px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    padding: 20px;
    text-align: center;
}


.badge{
    position: absolute;
    top: 10px;
    right: 10px;
    background: green;
    color: white;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}


.student-id{
    position: absolute;
    top: 10px;
    left: 10px;
    background: #007bff;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: bold;
}

.student-card img{
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin-top: 20px;
    
}
.student-card img:hover{
   width: 130px;
}

.student-card h2{
    margin: 15px 0 10px;
    color: brown;
    
}

.student-card p{
    margin: 5px 0;
    color: #007bff;
}
</style>
</head>
<body>

<div class="student-card">

    <div class="student-id">ID: STU001</div>

    <div class="badge">✔ Verified</div>

    <img src="Stu.jpg" alt="Student">

    <h2>Himas Mohamed</h2>

    <p>Computer Science</p>
    <p>Year 2</p>

</div>

</body>
</html>
