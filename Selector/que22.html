<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Navigation Menu</title>

    <style>
        nav ul {
            list-style: none;
            padding: 0;
        }

        nav>ul>li {
            background-color: lightblue;
            padding: 10px;
            margin: 5px 0;
        }



        nav ul li a {
            text-decoration: none;
            color: black;
            font-size: 18px;
        }

        /* Submenu */

        ul ul {
            margin-left: 20px;
        }
    </style>

</head>

<body>

    <nav>

        <ul>

            <li><a href="#">Home</a></li>

            <li>

                <a href="#">Products</a>

                <ul>
                    <li><a href="#">Laptop</a></li>
                    <li><a href="#">Mobile</a></li>
                    <li><a href="#">Keyboard</a></li>
                </ul>

            </li>

            <li>

                <a href="#">Services</a>

                <ul>
                    <li><a href="#">Web Design</a></li>
                    <li><a href="#">SEO</a></li>
                </ul>

            </li>

            <li><a href="#">Contact</a></li>

        </ul>

    </nav>

</body>

</html>
