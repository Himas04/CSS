<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Card</title>

<style>


.product-card{
    width: 350px;
    border: 2px solid black;
    padding: 20px;
    margin: auto;
}



.product-card ul li{
    color: blue;
}



.product-card > h2{
    font-size: 30px;
}



img + p{
    color: green;
    font-weight: bold;
}



h3 ~ div{
    border: 1px solid red;
    padding: 8px;
    margin-top: 5px;
}
img{
    width: 100px;
}

</style>

</head>

<body>

<div class="product-card">

    <h2>Gaming Keyboard</h2>

    <img src="dark-laptop-black-batman-drawing-qzkrge3o5i75str2.jpg"
         alt="Keyboard">

    <p>Price:5500Rs. </p>

    <h3>Product Details</h3>

    <div>Brand: JEDEL</div>

    <div>Model: KL138</div>

    <div>RGB Lighting: Yes</div>

    <ul>
        <li>USB Connection</li>
        <li>104 Keys</li>
        <li>Water Resistant</li>
    </ul>

</div>

</body>
</html>
