<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Profile Card</title>

<style>


.card{
    width: 350px;
    border: 2px solid black;
    padding: 20px;
    margin: auto;
}


.card ul li{
    color: blue;
}


.card > h2{
    font-size: 30px;
}


img + p{
    color: green;
    font-weight: bold;
}


h3 ~ div{
    border: 2px solid red;
    padding: 10px;
    margin-top: 10px;
}
img{
    width: 200px;
    border-radius: 55%;
}

</style>

</head>

<body>

<div class="card">

    <h2>Student Profile</h2>

    <img src="batman-sign-black-background-dc-superheroes-amoled-5k-8k-10k-3840x2160-4409.jpg"
         alt="Student Image">

    <p>Student ID: ST001</p>

    <h3>Student Information</h3>

    <div>Name: Himas</div>

    <div>Course: Computer Science</div>

    <div>Year: 2nd Year</div>

    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

</div>

</body>
</html>
